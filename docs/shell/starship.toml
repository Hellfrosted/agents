# Shared Windows/WSL/Linux prompt config.
# Styled to keep the old oh-my-posh two-line, segmented feel while staying portable.

format = """
[](fg:base)$os$shell[](fg:base) $git_branch$git_status$cmd_duration$time
[╭─](fg:surface1)$directory
[╰─](fg:surface1)$character"""
add_newline = true
command_timeout = 2000
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
base = "#1e1e2e"
surface0 = "#313244"
surface1 = "#45475a"
text = "#cdd6f4"
subtext1 = "#bac2de"
blue = "#89b4fa"
lavender = "#b4befe"
mauve = "#cba6f7"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
yellow = "#f9e2af"
peach = "#fab387"
red = "#f38ba8"

[os]
disabled = false
style = "bg:base fg:blue bold"
format = "[$symbol]($style)"

[os.symbols]
Windows = " win"
Ubuntu = " ubuntu"
Arch = " arch"
Linux = " linux"
Macos = " mac"

[shell]
disabled = false
style = "bg:base fg:mauve bold"
bash_indicator = " bash "
powershell_indicator = " pwsh "
zsh_indicator = " zsh "
fish_indicator = " fish "
cmd_indicator = " cmd "
format = "[$indicator]($style)"

[directory]
style = "fg:teal bold"
read_only_style = "fg:red bold"
truncation_length = 5
truncate_to_repo = false
home_symbol = "~"
read_only = " ro"
format = "[$path]($style)[$read_only]($read_only_style)"

[git_branch]
style = "fg:base bg:peach bold"
symbol = "git:"
format = "[](fg:peach)[$symbol$branch]($style)"

[git_status]
style = "fg:base bg:yellow bold"
format = "[$all_status$ahead_behind]($style)[](fg:yellow) "
conflicted = "="
ahead = " ↑"
behind = " ↓"
diverged = " ↕"
up_to_date = ""
untracked = " ?"
stashed = " $"
modified = " ~"
staged = " +"
renamed = " r"
deleted = " -"

[cmd_duration]
min_time = 1000
style = "fg:text bg:surface0"
format = "[](fg:surface0)[took $duration]($style)[](fg:surface0) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:subtext1"
format = "[](fg:surface0)[ $time ]($style)[](fg:surface0)"

[character]
success_symbol = "[❯](fg:green bold)"
error_symbol = "[❯](fg:red bold)"
vimcmd_symbol = "[❮](fg:green bold)"
